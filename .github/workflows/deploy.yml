name: Deploy to Vercel (production)

# Auto-deploy that works with a PRIVATE repo: the workflow runs inside this repo
# (so it has source access) and deploys to Vercel via the CLI using a token.
# This sidesteps Vercel's GitHub App needing private-repo access.
#
# One-time setup (see README): add a repo secret VERCEL_TOKEN with a Vercel token.

on:
  push:
    branches: [main]
  workflow_dispatch:

# These are identifiers (not secrets) for the linked Vercel project/team.
env:
  VERCEL_ORG_ID: team_KgzVFvH2iNS0GarBOMpFbIuV
  VERCEL_PROJECT_ID: prj_PjnSlwAk0vlxuxqfoHUPK79k2U1d

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test (quality gate)
        run: pnpm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (compiles app + edge auth middleware)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
