name: Update visual baselines

# Manually-triggered: regenerates the Chromium/Linux visual-regression baselines
# (which must match the CI runner's rendering) and commits them. Run this whenever
# an intentional UI change updates the sidebar snapshot.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install Playwright browser
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: Generate baselines
        run: pnpm -C apps/web exec playwright test visual.spec.ts --project=chromium --update-snapshots
      - name: Commit baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/e2e
          if git diff --cached --quiet; then
            echo "No baseline changes."
          else
            git commit -m "test(visual): update chromium baselines [skip ci]"
            git push
          fi
