<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Copa 2026 AI Command Center — Original emblem -->
  
  <!-- Background circle for contrast -->
  <circle cx="32" cy="32" r="30" fill="#0f1420"/>
  
  <!-- Outer hexagon shield -->
  <path d="M32 5 L55 18 L55 46 L32 59 L9 46 L9 18 Z" fill="none" stroke="#c9a24b" stroke-width="2.8"/>
  
  <!-- Inner hexagon accent -->
  <path d="M32 11 L49 22 L49 42 L32 53 L15 42 L15 22 Z" fill="none" stroke="#c9a24b" stroke-width="0.7" opacity="0.35"/>
  
  <!-- "26" large centered -->
  <text x="32" y="40" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#c9a24b" text-anchor="middle">26</text>
  
  <!-- Top accent dot -->
  <circle cx="32" cy="8" r="2.5" fill="#c9a24b"/>
  
  <!-- Bottom stadium arc -->
  <path d="M20 51 Q32 56 44 51" fill="none" stroke="#c9a24b" stroke-width="1.2" opacity="0.6"/>
  
  <!-- Side dots -->
  <circle cx="11" cy="32" r="1.5" fill="#c9a24b" opacity="0.4"/>
  <circle cx="53" cy="32" r="1.5" fill="#c9a24b" opacity="0.4"/>
</svg>
