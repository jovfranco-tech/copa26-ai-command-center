<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="regular">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FIFA Private World Cup Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- data (plain JS) -->
  <script src="wc-data.js"></script>

  <!-- app (babel) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-matches.jsx"></script>
  <script type="text/babel" src="screens-teams.jsx"></script>
  <script type="text/babel" src="screens-players.jsx"></script>
  <script type="text/babel" src="screens-standings.jsx"></script>
  <script type="text/babel" src="screens-bracket.jsx"></script>
  <script type="text/babel" src="screens-stats.jsx"></script>
  <script type="text/babel" src="screens-venues.jsx"></script>
  <script type="text/babel" src="screens-favorites.jsx"></script>
  <script type="text/babel" src="screens-ai.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    const mount = () => {
      if (!window.__WCRoot) { setTimeout(mount, 30); return; }
      const Root = window.__WCRoot;
      ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
    };
    mount();
  </script>

  <style id="__om-edit-overrides"></style>
</body>
</html>
